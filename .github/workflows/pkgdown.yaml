on:
  push:
    branches: [main, master]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable and configure Pages
        uses: actions/configure-pages@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, any::roxygen2
          needs: website

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Generate Rd documentation from roxygen comments
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - name: Install the package
        run: R CMD INSTALL --no-multiarch --with-keep.source .

      - name: Build pkgdown site (into docs/)
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Render the companion book
        run: quarto render book

      - name: Add the book to the site under /book/
        run: |
          mkdir -p docs/book
          cp -r book/_book/. docs/book/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
